services:
  - type: web
    name: telco-churn-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
    healthCheckPath: /api/v1/health

  - type: web
    name: telco-churn-ui
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/client_app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
