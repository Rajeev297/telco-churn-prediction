version: "3.9"

services:
  api:
    build: .
    container_name: churn-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2

  streamlit:
    build: .
    container_name: churn-ui
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - api
    command: streamlit run app/client_app.py --server.port 8501 --server.address 0.0.0.0
